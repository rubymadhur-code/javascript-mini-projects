<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 350px;
      background: rgba(255, 255, 255, 0.15);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #fff;
      margin-bottom: 15px;
    }

    .input-field {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border-radius: 8px;
      outline: none;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 15px;
    }

    input::placeholder {
      color: #eee;
    }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #fff;
      user-select: none;
    }

    .strength-meter {
      width: 100%;
      height: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.3);
      margin-top: 10px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: .4s;
    }

    #strengthText {
      margin-top: 10px;
      font-size: 14px;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Password Checker 🔐</h2>

    <div class="input-field">
      <input type="password" id="password" placeholder="Enter your password">
      <span class="toggle-btn" id="toggleBtn">Show</span>
    </div>

    <div class="strength-meter">
      <div class="strength-bar" id="strengthBar"></div>
    </div>

    <p id="strengthText">Start typing...</p>
  </div>


  <script>
    const password = document.getElementById("password");
    const strengthBar = document.getElementById("strengthBar");
    const strengthText = document.getElementById("strengthText");
    const toggleBtn = document.getElementById("toggleBtn");

    password.addEventListener("input", () => {
      let val = password.value;
      let strength = 0;

      if (val.match(/[a-z]/)) strength++;
      if (val.match(/[A-Z]/)) strength++;
      if (val.match(/[0-9]/)) strength++;
      if (val.match(/[$@#&!]/)) strength++;
      if (val.length >= 8) strength++;

      if (val === "") {
        strengthBar.style.width = "0%";
        strengthBar.style.background = "transparent";
        strengthText.innerText = "Start typing...";
        return;
      }

      switch (strength) {
        case 1:
          strengthBar.style.width = "20%";
          strengthBar.style.background = "#ff4f4f";
          strengthText.innerText = "Very Weak 😣";
          break;
        case 2:
          strengthBar.style.width = "40%";
          strengthBar.style.background = "#ff914d";
          strengthText.innerText = "Weak 😕";
          break;
        case 3:
          strengthBar.style.width = "60%";
          strengthBar.style.background = "#ffc93c";
          strengthText.innerText = "Medium 😐";
          break;
        case 4:
          strengthBar.style.width = "80%";
          strengthBar.style.background = "#7cd992";
          strengthText.innerText = "Strong 🙂";
          break;
        case 5:
          strengthBar.style.width = "100%";
          strengthBar.style.background = "#2ecc71";
          strengthText.innerText = "Very Strong 💪";
          break;
      }
    });

    toggleBtn.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        toggleBtn.textContent = "Hide";
      } else {
        password.type = "password";
        toggleBtn.textContent = "Show";
      }
    });
  </script>

</body>

</html>
