<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Cursor + Neon Cards </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 style="text-align:center;"> Neon Border Cards with Custom neon cursor</h1>

    <div class="cursor"></div>

    <div class="container">

        <div class="card" data-color="cyan">
            <img src="https://i.pravatar.cc/100?img=1" class="profile">
            <div class="text">Amazing UI work!</div>
            <div class="user">Rahul</div>
            <div class="role">Client</div>
        </div>

        <div class="card" data-color="pink">
            <img src="https://i.pravatar.cc/100?img=5" class="profile">
            <div class="text">Clean & fast delivery</div>
            <div class="user">Priya</div>
            <div class="role">Founder</div>
        </div>

        <div class="card" data-color="green">
            <img src="https://i.pravatar.cc/100?img=8" class="profile">
            <div class="text">Best UI animations!</div>
            <div class="user">Aman</div>
            <div class="role">Owner</div>
        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
