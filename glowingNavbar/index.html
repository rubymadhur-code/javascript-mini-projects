<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Navbar | LearnCodeEasy-99</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="top-space"></div>
        <div class="navigation">
            <ul>
                <li class="list active" style="--clr:#f44333">
                    <a href="#">
                        <span class="text">Home</span>
                        <span class="icon">
                            <i class="fa-solid fa-house"></i>
                        </span>
                    </a>
                </li>
                <li class="list" style="--clr:#0fc70f">
                    <a href="#">
                        <span class="text">About</span>
                        <span class="icon">
                            <i class="fa-solid fa-user"></i>
                        </span>
                    </a>
                </li>
                <li class="list" style="--clr:#ffa117">
                    <a href="#">
                        <span class="text">Services</span>
                        <span class="icon">
                            <i class="fa-solid fa-gear"></i>
                        </span>
                    </a>
                </li>
                <li class="list" style="--clr:#b145e9">
                    <a href="#">
                        <span class="text">Chat</span>
                        <span class="icon">
                            <i class="fa-solid fa-comment"></i>
                        </span>
                    </a>
                </li>
                <li class="list" style="--clr:#2196f3">
                    <a href="#">
                        <span class="text">Contact</span>
                        <span class="icon">
                            <i class="fa-solid fa-phone"></i>
                        </span>
                    </a>
                </li>
                <li class="indicator"></li>
            </ul>
        </div>
    </header>
    <script src="script.js"></script>
</body>

</html>
